<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#121212;
color:white;
}

header{
padding:16px;
font-size:20px;
font-weight:bold;
}

.section{
padding:16px;
}

.card{
background:#181818;
border-radius:12px;
padding:12px;
margin-bottom:16px;
}

iframe{
border-radius:12px;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#181818;
padding:10px;
text-align:center;
border-top:1px solid #333;
}
</style>
</head>

<body>

<header>🎧 Music App</header>

<div class="section">

<h3>💔 Galau Indo</h3>
<div class="card">
<iframe src="https://open.spotify.com/embed/playlist/2AxCFWDR8Ou4hSzeF8rFCV"
width="100%" height="352" frameborder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<h3>😌 Chill</h3>
<div class="card">
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4WYpdgoIcn6"

allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">

</div>

<h3>🙂 Happy</h3>

width="100%" height="352" frameborder="0"

</html>
